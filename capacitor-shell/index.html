<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b5fff" />
    <title>MOOVU</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f6fafc;
        color: #050505;
        display: flex;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        margin: 0 auto;
        max-width: 360px;
        text-align: center;
      }

      .logo-mark {
        display: block;
        height: auto;
        margin-bottom: 24px;
        width: min(240px, 72vw);
      }

      h1 {
        font-size: 28px;
        line-height: 1;
        margin: 0 0 12px;
      }

      p {
        color: #5b6776;
        font-size: 15px;
        line-height: 1.55;
        margin: 0 0 24px;
      }

      a {
        align-items: center;
        background: #0b5fff;
        border-radius: 18px;
        color: #fff;
        display: inline-flex;
        font-size: 15px;
        font-weight: 800;
        justify-content: center;
        min-height: 52px;
        padding: 0 22px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo-mark" src="./moovu-logo.png" alt="MOOVU Kasi Rides" />
      <h1>MOOVU</h1>
      <p>Connect to the internet to open the MOOVU mobile app.</p>
      <a href="https://moovurides.co.za">Open MOOVU</a>
    </main>
  </body>
</html>
